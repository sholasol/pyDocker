services:
  app:
    build: .
    ports:
      - "8000:8000"
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - .venv/
        - action: rebuild
          path: pyproject.toml
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      db:
        condition: service_healthy # Wait for DB to be fully ready
    restart: unless-stopped

  db:
    image: postgres:latest
    environment:
      - POSTGRES_DB=pydocker
      - POSTGRES_USER=pydocker
      - POSTGRES_PASSWORD=pydocker
    ports:
      - "5432:5432"
    volumes:
      # FIX: Use /var/lib/postgresql for Postgres 18+ compatibility
      - db_data:/var/lib/postgresql
    healthcheck: # Ensures the app waits for the DB to initialize
      test: ["CMD-SHELL", "pg_isready -U pydocker -d pydocker"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data: